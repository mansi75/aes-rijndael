name: AES Rijndael CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    name: Build & Test (Ubuntu)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc make python3 python3-pytest clang-format

      - name: Check formatting (clang-format)
        run: |
          clang-format --style=file --dry-run --Werror rijndael.c rijndael.h test_aes.c \
            || echo "Formatting differences detected (non-fatal)"

      - name: Build
        run: make all

      - name: Build C test binary
        run: make test_aes

      - name: Run C unit tests
        run: ./test_aes

      - name: Run Python test suite
        run: python3 -m pytest test_rijndael.py -v

      - name: Upload build artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aes-artefacts
          path: |
            rijndael.so
            test_aes